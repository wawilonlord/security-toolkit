<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Security Tools</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="topbar">
        <div>
          <p class="kicker">Local lab dashboard</p>
          <h1>Security Tools</h1>
        </div>
        <div class="status-pill">
          <span></span>
          Safe mode
        </div>
      </section>

      <section class="notice">
        Use only on systems you own or have permission to test. Email checks verify syntax and mail servers, not private mailboxes.
      </section>

      <section class="grid">
        <article class="panel accent-green">
          <div class="panel-head">
            <div>
              <p class="tool-label">Network</p>
              <h2>Nmap Scan</h2>
            </div>
            <div class="mark">01</div>
          </div>

          <label for="target">Target</label>
          <input id="target" placeholder="scanme.nmap.org" autocomplete="off" />

          <label for="preset">Preset</label>
          <select id="preset">
            <option value="quick">Quick ports</option>
            <option value="ports">Top 100 ports</option>
            <option value="service">Light service scan</option>
          </select>

          <button id="scanBtn">Run scan</button>
        </article>

        <article class="panel accent-cyan">
          <div class="panel-head">
            <div>
              <p class="tool-label">Mail</p>
              <h2>Email Check</h2>
            </div>
            <div class="mark">02</div>
          </div>

          <label for="email">Email</label>
          <input id="email" placeholder="name@example.com" autocomplete="off" />

          <div class="mini-copy">
            Checks format, domain, and MX records.
          </div>

          <button id="emailBtn">Check email</button>
        </article>
      </section>

      <section class="output-panel">
        <div class="panel-head compact">
          <div>
            <p class="tool-label">Results</p>
            <h2>Output</h2>
          </div>
          <button class="ghost" id="clearBtn">Clear</button>
        </div>
        <pre id="output">Ready.</pre>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
